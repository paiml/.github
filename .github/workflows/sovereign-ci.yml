# Sovereign CI — reusable per-repo test/lint/coverage/security workflow
#
# All sovereign stack repos call this instead of defining their own CI jobs.
# Change once here → applies to all 38 repos instantly.
#
# Spec: infra/docs/specifications/components/infra-score.md
#
# Usage in each repo's ci.yml:
#   jobs:
#     ci:
#       uses: paiml/.github/.github/workflows/sovereign-ci.yml@main
#       with:
#         repo: ${{ github.event.repository.name }}
#       secrets: inherit

name: Sovereign CI

on:
  workflow_call:
    inputs:
      repo:
        description: 'Repository name'
        required: true
        type: string
      test_args:
        description: 'Extra args for cargo test (e.g. --features cli)'
        required: false
        default: ''
        type: string
      clippy_args:
        description: 'Extra args for clippy (e.g. -p my-crate)'
        required: false
        default: '--all-targets'
        type: string
      skip_coverage:
        description: 'Skip coverage job'
        required: false
        default: false
        type: boolean
      run_benchmarks:
        description: 'Run criterion benchmarks (slow, use for nightly only)'
        required: false
        default: false
        type: boolean

# HD-02: Least-privilege token — only escalate where needed
permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: "always"

jobs:
  test:
    name: test
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        env:
          TEST_ARGS: ${{ inputs.test_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo test --lib $TEST_ARGS 2>&1 || \
          cargo test --lib -p "$REPO_NAME" $TEST_ARGS 2>&1 || \
          echo "::warning::Tests failed — check workspace path dependencies"

  lint:
    name: lint
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check 2>&1 || echo "::warning::Format issues found"
        continue-on-error: true
      - name: Clippy
        env:
          CLIPPY_ARGS: ${{ inputs.clippy_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo clippy $CLIPPY_ARGS -- -D warnings 2>&1 || \
          cargo clippy -p "$REPO_NAME" -- -D warnings 2>&1 || \
          echo "::warning::Clippy failed — check workspace path dependencies"

  coverage:
    name: coverage
    if: ${{ !inputs.skip_coverage }}
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
      - name: Install llvm-cov
        run: cargo install cargo-llvm-cov --locked || true
      - name: Run coverage
        env:
          TEST_ARGS: ${{ inputs.test_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo llvm-cov test --lib --lcov --output-path lcov.info $TEST_ARGS 2>&1 || \
          cargo llvm-cov test --lib -p "$REPO_NAME" --lcov --output-path lcov.info 2>&1 || \
          echo "::warning::Coverage failed — check workspace path dependencies"
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
        continue-on-error: true

  bench:
    name: bench
    if: ${{ inputs.run_benchmarks }}
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Run criterion benchmarks
        env:
          REPO_NAME: ${{ inputs.repo }}
        run: |
          if ls benches/*.rs 2>/dev/null | head -1 | grep -q '.'; then
            cargo bench --bench '*' -- --output-format bencher 2>&1 | tee bench-results.txt || \
            cargo bench -p "$REPO_NAME" -- --output-format bencher 2>&1 | tee bench-results.txt || \
            echo "::warning::Benchmarks failed"
          else
            echo "No benches/ directory — skipping"
          fi
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ inputs.repo }}
          path: bench-results.txt
          retention-days: 90
        continue-on-error: true

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: Audit
        run: cargo audit

  provenance:
    name: provenance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2
        with:
          subject-path: 'Cargo.toml'
        continue-on-error: true

  gate:
    name: gate
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 5
    if: always()
    needs: [test, lint, coverage, security, provenance]
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Test failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "::error::Lint failed"
            exit 1
          fi
          echo "All critical jobs passed"
