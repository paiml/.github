        - /home/noah/data/sccache:/sccache
        - /var/log/ci-metrics:/var/log/ci-metrics
        # paiml/infra#75: per-PR CARGO_TARGET_DIR isolation — see test job.
        - /mnt/nvme-raid0/targets/sovereign-ci-${{ inputs.repo }}/${{ github.event.pull_request.number || github.ref_name }}:/workspace/target
    timeout-minutes: 60
    continue-on-error: true
    env:
      CARGO_TARGET_DIR: /workspace/target
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install extra packages
        if: ${{ inputs.extra_pkgs != '' }}
        run: |
          apt-get update -qq && apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || \
          sudo apt-get update -qq && sudo apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || true
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          # APR-MONO (2026-04-13): trueno, trueno-rag, trueno-db, trueno-viz,
          # alimentar, presentar, renacer, batuta, realizar, probar merged into
          # aprender monorepo and archived. Removed from sibling-clone list to
          # stop wasting runner minutes on 10 archived repos × 5 CI stages.
          # provable-contracts kept (pv codegen still uses it); aprender +
          # whisper.apr still active.
          for repo in provable-contracts aprender whisper.apr; do
            # Skip the current repo — it is already checked out at $GITHUB_WORKSPACE
            [ "$repo" = "${{ inputs.repo }}" ] && continue
            # Remove stale partial clones (file instead of dir)
            if [ -e "$repo" ] && [ ! -d "$repo" ]; then rm -f "$repo"; fi
            # Validate cached clone. If HEAD missing or fetch fails, nuke + re-clone.
            # Silent `|| true` on fetch previously masked broken caches (bashrs#197).
            if [ -d "$repo" ]; then
              if ! git -C "$repo" rev-parse HEAD >/dev/null 2>&1; then
                echo "::warning::$repo cache invalid (no HEAD) — re-cloning"
                rm -rf "$repo"
              elif ! (git -C "$repo" fetch --depth 1 origin main 2>&1 && git -C "$repo" reset --hard FETCH_HEAD >/dev/null 2>&1); then
                echo "::warning::$repo fetch failed — re-cloning"
                rm -rf "$repo"
              fi
            fi
            if [ ! -d "$repo" ]; then
              for attempt in 1 2 3; do
                git clone --depth 1 "https://github.com/paiml/$repo.git" "$repo" 2>&1 && break
                rm -rf "$repo"  # Clean failed clone before retry
                echo "::warning::Retry $attempt for $repo clone"
                sleep 2
              done
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
          for repo in provable-contracts; do
            if [ ! -d "$repo" ]; then
              echo "::error::Critical sibling $repo missing — builds will fail"
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
      - name: Generate contract assertions (pv codegen)
        run: |
          # pv is baked into sovereign-ci:stable at /usr/local/cargo/bin/pv
          PV=""
          for candidate in /usr/local/cargo/bin/pv /usr/local/bin/pv; do
            if [ -f "$candidate" ]; then PV="$candidate"; break; fi
          done
          if [ -z "$PV" ]; then PV=$(which pv 2>/dev/null || true); fi
          if [ -z "$PV" ]; then
            echo "::warning::pv not found — skipping contract generation"
            exit 0
          fi
          PC_CONTRACTS="$GITHUB_WORKSPACE/../provable-contracts/contracts"
          if [ -f src/lib.rs ] && grep -q 'mod generated_contracts' src/lib.rs && [ ! -f src/generated_contracts.rs ]; then
            if [ -d "$PC_CONTRACTS" ]; then
              "$PV" codegen "$PC_CONTRACTS" -o src/generated_contracts.rs || true
            elif [ -d contracts ]; then
              "$PV" codegen contracts/ -o src/generated_contracts.rs || true
            fi
          fi
          for src_dir in crates/*/src */src; do
            if [ -d "$src_dir" ] && [ -f "$src_dir/lib.rs" ] && grep -q 'mod generated_contracts' "$src_dir/lib.rs" && [ ! -f "$src_dir/generated_contracts.rs" ]; then
              member_dir=$(dirname "$src_dir")
              if [ -d "$PC_CONTRACTS" ]; then
                "$PV" codegen "$PC_CONTRACTS" -o "$src_dir/generated_contracts.rs" || true
              elif [ -d "$member_dir/contracts" ]; then
                "$PV" codegen "$member_dir/contracts" -o "$src_dir/generated_contracts.rs" || true
              fi
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Run criterion benchmarks
        env:
          REPO_NAME: ${{ inputs.repo }}
          RUSTC_WRAPPER: ${{ inputs.enable_sccache && 'rustc-sccache' || '' }}
          SCCACHE_DIR: ${{ inputs.enable_sccache && '/sccache' || '' }}
        run: |
          if ls benches/*.rs 2>/dev/null | head -1 | grep -q '.'; then
            cargo bench --bench '*' -- --output-format bencher 2>&1 | tee bench-results.txt || \
            cargo bench -p "$REPO_NAME" -- --output-format bencher 2>&1 | tee bench-results.txt || \
            echo "::warning::Benchmarks failed"
          else
            echo "No benches/ directory — skipping"
          fi
      - name: Record sccache stats
        if: ${{ always() && inputs.enable_sccache }}
        run: |
          sccache --show-stats --stats-format json > \
            "/var/log/ci-metrics/sccache-${{ github.run_id }}-${{ inputs.repo }}-bench.json" \
            2>/dev/null || echo "::warning::sccache stats unavailable"
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ inputs.repo }}
          path: bench-results.txt
          retention-days: 90
        continue-on-error: true
      # FIVE-WHYS ROOT CAUSE (2026-04-20, paiml/infra#69):
      # Container runs as root; sibling-clone dir $GITHUB_WORKSPACE/.. is
      # bind-mounted from the runner host, so root-owned files leak out of
      # the container onto the runner's _work tree. Subsequent non-container
      # jobs (e.g. `security`) run as the runner user and can't `rm -rf`
      # the stale clones → silent 15s failures.
      # Fix: chown back to the runner uid/gid before the container exits.
      # `always()` so the chown runs even if tests fail, preventing poison
      # from surviving red builds.
      - name: Restore runner ownership of sibling workspace
        if: always()
        run: |
          chown -R 1000:1000 "$GITHUB_WORKSPACE/.." 2>/dev/null || true

  security:
    name: security
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 10
    # Rule 8: Security is a required check — no more continue-on-error.
    # Advisory exemptions go in .cargo/audit.toml, not in CI skip logic.
    # Moved from ubuntu-latest to self-hosted: matches sovereign runner policy
    # and avoids sibling checkout PWD issues on GitHub-hosted runners.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install extra packages
        if: ${{ inputs.extra_pkgs != '' }}
        run: |
          apt-get update -qq && apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || \
          sudo apt-get update -qq && sudo apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || true
      # FIVE-WHYS ROOT CAUSE RECOVERY (2026-04-20, paiml/infra#69):
      # Container jobs upstream may have left root-owned files in the
      # sibling workspace (bind-mount leak). Every container job now
      # chowns back on exit, but for defense in depth — and to recover
      # from runs that predated the fix — reclaim ownership before we
      # touch the sibling tree. Without this, `rm -rf` on stale clones
      # fails with EACCES and the job dies in 15s.
      - name: Reclaim sibling workspace ownership (defense in depth)
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/.." 2>/dev/null || true
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          # APR-MONO (2026-04-13): trueno, trueno-rag, trueno-db, trueno-viz,
          # alimentar, presentar, renacer, batuta, realizar, probar merged into
          # aprender monorepo and archived. Removed from sibling-clone list to
          # stop wasting runner minutes on 10 archived repos × 5 CI stages.
          # provable-contracts kept (pv codegen still uses it); aprender +
          # whisper.apr still active.
          for repo in provable-contracts aprender whisper.apr; do
            # Skip the current repo — it is already checked out at $GITHUB_WORKSPACE
            [ "$repo" = "${{ inputs.repo }}" ] && continue
            # Remove stale partial clones (file instead of dir)
            if [ -e "$repo" ] && [ ! -d "$repo" ]; then rm -f "$repo"; fi
            # Validate cached clone. If HEAD missing or fetch fails, nuke + re-clone.
            # Silent `|| true` on fetch previously masked broken caches (bashrs#197).
            if [ -d "$repo" ]; then
              if ! git -C "$repo" rev-parse HEAD >/dev/null 2>&1; then
                echo "::warning::$repo cache invalid (no HEAD) — re-cloning"
                rm -rf "$repo"
              elif ! (git -C "$repo" fetch --depth 1 origin main 2>&1 && git -C "$repo" reset --hard FETCH_HEAD >/dev/null 2>&1); then
                echo "::warning::$repo fetch failed — re-cloning"
                rm -rf "$repo"
              fi
            fi
            if [ ! -d "$repo" ]; then
              for attempt in 1 2 3; do
                git clone --depth 1 "https://github.com/paiml/$repo.git" "$repo" 2>&1 && break
                rm -rf "$repo"  # Clean failed clone before retry
                echo "::warning::Retry $attempt for $repo clone"
                sleep 2
              done
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
          for repo in provable-contracts; do
            if [ ! -d "$repo" ]; then
              echo "::error::Critical sibling $repo missing — builds will fail"
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      # FIVE-WHYS ROOT CAUSE (2026-04-24, aprender#1043 ANDON, paiml/infra#77):
      # The `security` job runs bare-metal (runs-on: [self-hosted, clean-room])
      # so 16 intel-clean-room-* runners all share HOME=/home/noah and thus
      # $HOME/.cargo/registry. Concurrent `cargo install cargo-audit` jobs
      # race on src/ extraction + .cache/ writes, producing:
      #   warning: failed to write cache, path: ~/.cargo/registry/index/.../.cache/ca/rg/<crate>, Permission denied (os error 13)
      #   error: couldn't read ~/.cargo/registry/src/.../fnv-1.0.7/lib.rs: Permission denied
      #   error: could not compile `fnv` (lib) due to 1 previous error
      # Per-runner CARGO_HOME (matches `target/` per-runner pattern already
      # used by the `test`/`lint`/`coverage` jobs above) eliminates the race
      # class at source. Independent of aprender#1043's workspace-test fix
      # (which addresses the containerized workspace-test job's registry
      # mount, not this bare-metal security job's $HOME).
      - name: Install cargo-audit (per-runner CARGO_HOME)
        run: |
          export CARGO_HOME="/tmp/cargo-home-security-${{ runner.name }}"
          mkdir -p "$CARGO_HOME"
          echo "CARGO_HOME=$CARGO_HOME" >> "$GITHUB_ENV"
          cargo install cargo-audit --locked --root "$CARGO_HOME" || true
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Audit
        run: |
          # FIVE-WHYS ROOT CAUSE (2026-04-12):
          # The "Checkout sibling repos" step does cd $GITHUB_WORKSPACE/..
          # and never restores PWD. Without this cd, cargo audit reads
          # .cargo/audit.toml from a sibling repo (main branch), not from
          # the PR checkout — causing advisory exemptions to be silently
          # ignored. This was the root cause of 5 CI reruns on PR #726.
          cd "$GITHUB_WORKSPACE"

          # Build --ignore flags from .cargo/audit.toml if it exists.
          # cargo-audit 0.22 does NOT read config files — only CLI flags.
          IGNORE_FLAGS=""
          if [ -f .cargo/audit.toml ]; then
            for id in $(sed -n 's/.*\(RUSTSEC-[0-9]*-[0-9]*\).*/\1/p' .cargo/audit.toml); do
              IGNORE_FLAGS="$IGNORE_FLAGS --ignore $id"
            done
            echo "Audit ignores: $IGNORE_FLAGS"
          fi

          # CONTRACT: FALSIFY-AUDIT-001 — verify PWD and ignore flag count.
          if [ -f .cargo/audit.toml ]; then
            EXPECTED=$(sed -n 's/.*\(RUSTSEC-[0-9]*-[0-9]*\).*/\1/p' .cargo/audit.toml | wc -l)
            ACTUAL=$(echo "$IGNORE_FLAGS" | tr ' ' '\n' | grep -c '^--ignore$' || echo 0)
            echo "FALSIFY-AUDIT-001: expected=$EXPECTED actual=$ACTUAL pwd=$(pwd)"
            if [ "$EXPECTED" -ne "$ACTUAL" ]; then
              echo "::error::FALSIFY-AUDIT-001: Expected $EXPECTED ignores, got $ACTUAL. PWD=$(pwd)"
              exit 1
            fi
          fi

          cargo audit $IGNORE_FLAGS

  provenance:
    name: provenance
    # falsify-f8-allow: SLSA attest-build-provenance needs GitHub OIDC id-token, only issued on GitHub-hosted runners. Job is continue-on-error (advisory).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2
        with:
          subject-path: 'Cargo.toml'
        continue-on-error: true

  gate:
    name: gate
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 5
    if: always()
    needs: [test, lint, coverage, security, provenance]
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Test failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" = "failure" ]; then
            echo "::error::Coverage failed"
            exit 1
          fi
          # Rule 8: Security is now mandatory (was silently skipped before PR #726)
          if [ "${{ needs.security.result }}" = "failure" ]; then
            echo "::error::Security audit failed — check .cargo/audit.toml exemptions"
            exit 1
          fi
          echo "All critical jobs passed (test + lint + coverage + security)"
