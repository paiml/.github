# Sovereign CI — reusable per-repo test/lint/coverage/security workflow
#
# All sovereign stack repos call this instead of defining their own CI jobs.
# Change once here → applies to all 38 repos instantly.
#
# Self-hosted jobs run inside the sovereign-ci container (built by forjar).
# Each job gets an isolated filesystem — no shared ~/.rustup/, no race conditions.
# Image: localhost:5000/sovereign-ci:stable (local registry on mac-server)
# Rebuild: cd infra && make -f machines/intel/Makefile ci-image
#
# Spec: infra/docs/specifications/components/infra-score.md
#
# Usage in each repo's ci.yml:
#   jobs:
#     ci:
#       uses: paiml/.github/.github/workflows/sovereign-ci.yml@main
#       with:
#         repo: ${{ github.event.repository.name }}
#       secrets: inherit

name: Sovereign CI

on:
  workflow_call:
    inputs:
      repo:
        description: 'Repository name'
        required: true
        type: string
      test_args:
        description: 'Extra args for cargo test (e.g. --features cli)'
        required: false
        default: ''
        type: string
      clippy_args:
        description: 'Extra args for clippy (e.g. -p my-crate)'
        required: false
        default: '--all-targets'
        type: string
      skip_coverage:
        description: 'Skip coverage job'
        required: false
        default: false
        type: boolean
      run_benchmarks:
        description: 'Run criterion benchmarks (slow, use for nightly only)'
        required: false
        default: false
        type: boolean
      extra_pkgs:
        description: 'Extra apt packages to install in container (e.g. python3-dev libclang-dev)'
        required: false
        default: ''
        type: string
      enable_sccache:
        description: 'sccache compiler cache (build-performance.md §5.3). Fleet-default on 2026-04-18 after Phase 3 pilot: F9 p95=100%, n=24 runs, median=100%. Set false to disable per-repo.'
        required: false
        default: true
        type: boolean
      use_nextest:
        description: 'cargo nextest run instead of cargo test (build-performance.md §4.3 + §7 Phase 2). 30-40% test-job speedup on large suites. Pilot repos only until F11 test-job p95 ≤ 300s verified over 7 days.'
        required: false
        default: false
        type: boolean
      test_workspace:
        description: 'PMAT-159: test all workspace members with `--workspace --lib` (not just root). Opt-in because workspace members may not build in the sovereign-ci container (e.g. aprender-gpu needs cuBLAS). Pair with test_args exclusions as needed.'
        required: false
        default: false
        type: boolean
      coverage_min:
        description: >
          OPT-IN line-coverage floor (ratchet, PMAT build-system audit gap #1).
          DEFAULT IS EMPTY → behavior is UNCHANGED for every repo that does not
          set it (coverage stays purely advisory, exactly as before). When set
          to a number (e.g. "96.9"), the coverage job FAILS if measured line
          coverage drops below this floor. Additionally, if a committed baseline
          file (see coverage_baseline_file) exists, the job FAILS on ANY DROP
          below the recorded baseline — so enabling this on an already-green
          repo can never break it (the baseline is its current value). This is a
          ratchet, not an absolute jump: it blocks regressions without demanding
          an immediate coverage increase. Pilot: aprender only.
        required: false
        default: ''
        type: string
      coverage_baseline_file:
        description: >
          Path (repo-relative) to a committed file holding a single float = the
          last-known-good line-coverage %. Used as the ratchet floor when
          coverage_min is set: the effective floor is max(coverage_min,
          baseline). Inert unless coverage_min is non-empty. Default:
          .pmat/coverage-baseline.txt
        required: false
        default: '.pmat/coverage-baseline.txt'
        type: string

# HD-02: Least-privilege token — only escalate where needed
permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: "always"
  # Prevent OTLP export hangs in CI (no collector available).
  # Default BSP export timeout is 30s; set to 5s for fast failure.
  OTEL_BSP_EXPORT_TIMEOUT: "5000"
  OTEL_EXPORTER_OTLP_TIMEOUT: "5000"

jobs:
  test:
    name: test
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable@sha256:10486da5daa3786f3264aa0e19fdde007e7ba1eca1d47ba587947946e42bd871
      # Phase 3 §5.3 — sccache rustc cache + /var/log/ci-metrics for F9 stats.
      # Mounted unconditionally (no-op when enable_sccache=false). Self-hosted
      # runners are on intel; paths are forjar-managed host dirs.
      volumes:
        - /home/noah/data/sccache:/sccache
        - /var/log/ci-metrics:/var/log/ci-metrics
        # paiml/infra#75 (2026-04-23): per-PR CARGO_TARGET_DIR isolation.
        # Default /__w/<repo>/<repo>/target/ is shared across concurrent PR
        # builds on the same self-hosted runner; cargo's fingerprint directory
        # is not concurrent-safe and collides with "No such file or directory"
        # errors (15 observed on aprender PR #1019). Mirrors the aprender
        # workspace-test pattern (task #134).
        - /mnt/nvme-raid0/targets/sovereign-ci-${{ inputs.repo }}/${{ github.event.pull_request.number || github.ref_name }}:/workspace/target
    # PMAT-159 (2026-04-20): bumped 30→60 min so workspace-mode callers
    # (test_workspace: true) have headroom to compile + test large workspaces.
    # Default --lib callers are well under 30 min; the ceiling only binds for
    # aprender-scale workspaces and is safe to extend fleet-wide.
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: /workspace/target
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install extra packages
        if: ${{ inputs.extra_pkgs != '' }}
        run: |
          apt-get update -qq && apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || \
          sudo apt-get update -qq && sudo apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || true
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          # APR-MONO (2026-04-13): trueno, trueno-rag, trueno-db, trueno-viz,
          # alimentar, presentar, renacer, batuta, realizar, probar merged into
          # aprender monorepo and archived. Removed from sibling-clone list to
          # stop wasting runner minutes on 10 archived repos × 5 CI stages.
          # provable-contracts kept (pv codegen still uses it); aprender +
          # whisper.apr still active.
          for repo in provable-contracts aprender whisper.apr; do
            # Skip the current repo — it is already checked out at $GITHUB_WORKSPACE
            [ "$repo" = "${{ inputs.repo }}" ] && continue
            # Remove stale partial clones (file instead of dir)
            if [ -e "$repo" ] && [ ! -d "$repo" ]; then rm -f "$repo"; fi
            # Validate cached clone. If HEAD missing or fetch fails, nuke + re-clone.
            # Silent `|| true` on fetch previously masked broken caches (bashrs#197).
            if [ -d "$repo" ]; then
              if ! git -C "$repo" rev-parse HEAD >/dev/null 2>&1; then
                echo "::warning::$repo cache invalid (no HEAD) — re-cloning"
                rm -rf "$repo"
              elif ! (git -C "$repo" fetch --depth 1 origin main 2>&1 && git -C "$repo" reset --hard FETCH_HEAD >/dev/null 2>&1); then
                echo "::warning::$repo fetch failed — re-cloning"
                rm -rf "$repo"
              fi
            fi
            if [ ! -d "$repo" ]; then
              for attempt in 1 2 3; do
                git clone --depth 1 "https://github.com/paiml/$repo.git" "$repo" 2>&1 && break
                rm -rf "$repo"  # Clean failed clone before retry
                echo "::warning::Retry $attempt for $repo clone"
                sleep 2
              done
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
          # Verify critical siblings
          for repo in provable-contracts; do
            if [ ! -d "$repo" ]; then
              echo "::error::Critical sibling $repo missing — builds will fail"
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
      - name: Generate contract assertions (pv codegen)
        run: |
          # pv is baked into sovereign-ci:stable at /usr/local/cargo/bin/pv
          PV=""
          for candidate in /usr/local/cargo/bin/pv /usr/local/bin/pv; do
            if [ -f "$candidate" ]; then PV="$candidate"; break; fi
          done
          if [ -z "$PV" ]; then PV=$(which pv 2>/dev/null || true); fi
          if [ -z "$PV" ]; then
            echo "::warning::pv not found (searched /usr/local/cargo/bin /usr/local/bin PATH)"
            ls -la /usr/local/cargo/bin/ 2>/dev/null | head -5 || echo "  /usr/local/cargo/bin/ not found"
            exit 0
          fi
          echo "pv found at: $PV"
          # Master contract set from provable-contracts sibling (276 contracts, 646 preconditions)
          PC_CONTRACTS="$GITHUB_WORKSPACE/../provable-contracts/contracts"
          # Generate for root src/ if mod generated_contracts exists
          if [ -f src/lib.rs ] && grep -q 'mod generated_contracts' src/lib.rs && [ ! -f src/generated_contracts.rs ]; then
            # Use master contract set (276 contracts, all macros including kernel ops)
            if [ -d "$PC_CONTRACTS" ]; then
              "$PV" codegen "$PC_CONTRACTS" -o src/generated_contracts.rs || true
            elif [ -d contracts ]; then
              "$PV" codegen contracts/ -o src/generated_contracts.rs || true
            fi
          fi
          # Generate for workspace members (crates/*/, */src/)
          for src_dir in crates/*/src */src; do
            if [ -d "$src_dir" ] && [ -f "$src_dir/lib.rs" ] && grep -q 'mod generated_contracts' "$src_dir/lib.rs" && [ ! -f "$src_dir/generated_contracts.rs" ]; then
              member_dir=$(dirname "$src_dir")
              if [ -d "$PC_CONTRACTS" ]; then
                "$PV" codegen "$PC_CONTRACTS" -o "$src_dir/generated_contracts.rs" || true
              elif [ -d "$member_dir/contracts" ]; then
                "$PV" codegen "$member_dir/contracts" -o "$src_dir/generated_contracts.rs" || true
              fi
            fi
          done
          # Note: generated contract macros may have unused variables (provable-contracts#64).
          # This is handled by adding -A unused-variables to the clippy step.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        env:
          TEST_ARGS: ${{ inputs.test_args }}
          REPO_NAME: ${{ inputs.repo }}
          RUSTC_WRAPPER: ${{ inputs.enable_sccache && 'rustc-sccache' || '' }}
          SCCACHE_DIR: ${{ inputs.enable_sccache && '/sccache' || '' }}
          USE_NEXTEST: ${{ inputs.use_nextest }}
          TEST_SCOPE: ${{ inputs.test_workspace && '--workspace --lib' || '--lib' }}
        run: |
          # Mark workspace as safe for git operations inside tests (dubious ownership in containers)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Phase 2 §4.3 — nextest drops ~35% off test-job wall-clock on large suites.
          # PMAT-159 (2026-04-20): `test_workspace: true` opts into `--workspace --lib` so
          # workspace-member lib tests are exercised. Default stays `--lib` (root only) for
          # back-compat: many repos have workspace members that don't build in the sovereign-ci
          # container. Opt-in callers pair this with `test_args` exclusions as needed.
          if [ "$USE_NEXTEST" = "true" ]; then
            cargo nextest run $TEST_SCOPE $TEST_ARGS 2>&1 || \
            cargo nextest run --lib -p "$REPO_NAME" $TEST_ARGS 2>&1 || \
            { echo "::warning::nextest failed — falling back to cargo test"; \
              cargo test $TEST_SCOPE $TEST_ARGS 2>&1 || \
              cargo test --lib -p "$REPO_NAME" $TEST_ARGS 2>&1 || \
              { echo "::error::Tests failed — check workspace path dependencies"; exit 1; }; }
          else
            cargo test $TEST_SCOPE $TEST_ARGS 2>&1 || \
            cargo test --lib -p "$REPO_NAME" $TEST_ARGS 2>&1 || \
            { echo "::error::Tests failed — check workspace path dependencies"; exit 1; }
          fi
      - name: Record sccache stats
        if: ${{ always() && inputs.enable_sccache }}
        run: |
          sccache --show-stats --stats-format json > \
            "/var/log/ci-metrics/sccache-${{ github.run_id }}-${{ inputs.repo }}-test.json" \
            2>/dev/null || echo "::warning::sccache stats unavailable"

      # FIVE-WHYS ROOT CAUSE (2026-04-20, paiml/infra#69):
      # Container runs as root; sibling-clone dir $GITHUB_WORKSPACE/.. is
      # bind-mounted from the runner host, so root-owned files leak out of
      # the container onto the runner's _work tree. Subsequent non-container
      # jobs (e.g. `security`) run as the runner user and can't `rm -rf`
      # the stale clones → silent 15s failures.
      # Fix: chown back to the runner uid/gid before the container exits.
      # `always()` so the chown runs even if tests fail, preventing poison
      # from surviving red builds.
      - name: Restore runner ownership of sibling workspace
        if: always()
        run: |
          chown -R 1000:1000 "$GITHUB_WORKSPACE/.." 2>/dev/null || true

  lint:
    name: lint
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable@sha256:10486da5daa3786f3264aa0e19fdde007e7ba1eca1d47ba587947946e42bd871
      # Phase 3 §5.3 — sccache rustc cache + /var/log/ci-metrics for F9 stats.
      # Mounted unconditionally (no-op when enable_sccache=false). Self-hosted
      # runners are on intel; paths are forjar-managed host dirs.
      volumes:
        - /home/noah/data/sccache:/sccache
        - /var/log/ci-metrics:/var/log/ci-metrics
        # paiml/infra#75: per-PR CARGO_TARGET_DIR isolation — see test job.
        - /mnt/nvme-raid0/targets/sovereign-ci-${{ inputs.repo }}/${{ github.event.pull_request.number || github.ref_name }}:/workspace/target
    # PMAT-159 (2026-04-20): bumped 30→60 min so workspace-mode callers
    # (test_workspace: true) have headroom to compile + test large workspaces.
    # Default --lib callers are well under 30 min; the ceiling only binds for
    # aprender-scale workspaces and is safe to extend fleet-wide.
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: /workspace/target
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install extra packages
        if: ${{ inputs.extra_pkgs != '' }}
        run: |
          apt-get update -qq && apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || \
