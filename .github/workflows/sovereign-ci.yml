      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
        continue-on-error: true

  bench:
    name: bench
    if: ${{ inputs.run_benchmarks }}
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable@sha256:c23c453328df86562ba69410810180d205490c6b202342972f65af7050db6686
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install extra packages
        if: ${{ inputs.extra_pkgs != '' }}
        run: |
          apt-get update -qq && apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || \
          sudo apt-get update -qq && sudo apt-get install -y -qq ${{ inputs.extra_pkgs }} 2>/dev/null || true
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper.apr; do
