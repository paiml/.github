# Sovereign CI — reusable per-repo test/lint/coverage/security workflow
#
# All sovereign stack repos call this instead of defining their own CI jobs.
# Change once here → applies to all 38 repos instantly.
#
# Self-hosted jobs run inside the sovereign-ci container (built by forjar).
# Each job gets an isolated filesystem — no shared ~/.rustup/, no race conditions.
# Image: localhost:5000/sovereign-ci:stable (local registry on mac-server)
# Rebuild: cd infra && make -f machines/intel/Makefile ci-image
#
# Spec: infra/docs/specifications/components/infra-score.md
#
# Usage in each repo's ci.yml:
#   jobs:
#     ci:
#       uses: paiml/.github/.github/workflows/sovereign-ci.yml@main
#       with:
#         repo: ${{ github.event.repository.name }}
#       secrets: inherit

name: Sovereign CI

on:
  workflow_call:
    inputs:
      repo:
        description: 'Repository name'
        required: true
        type: string
      test_args:
        description: 'Extra args for cargo test (e.g. --features cli)'
        required: false
        default: ''
        type: string
      clippy_args:
        description: 'Extra args for clippy (e.g. -p my-crate)'
        required: false
        default: '--all-targets'
        type: string
      skip_coverage:
        description: 'Skip coverage job'
        required: false
        default: false
        type: boolean
      run_benchmarks:
        description: 'Run criterion benchmarks (slow, use for nightly only)'
        required: false
        default: false
        type: boolean

# HD-02: Least-privilege token — only escalate where needed
permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: "always"

jobs:
  test:
    name: test
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper.apr; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --quiet "https://github.com/paiml/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
      - name: Generate contract assertions (pv codegen)
        run: |
          # Download pv if not baked into container image
          if ! command -v pv &>/dev/null; then
            curl -sSL "https://github.com/paiml/provable-contracts/releases/download/nightly/pv-x86_64-unknown-linux-gnu.tar.gz" \
              | tar xz -C /usr/local/bin || echo "::warning::Failed to download pv binary"
          fi
          if ! command -v pv &>/dev/null; then
            echo "::warning::pv not available — skipping contract generation"
            exit 0
          fi
          # Master contract set from provable-contracts sibling (276 contracts, 646 preconditions)
          PC_CONTRACTS="$GITHUB_WORKSPACE/../provable-contracts/contracts"
          # Generate for root src/ if mod generated_contracts exists
          if [ -f src/lib.rs ] && grep -q 'mod generated_contracts' src/lib.rs && [ ! -f src/generated_contracts.rs ]; then
            if [ -d contracts ]; then
              pv codegen contracts/ -o src/generated_contracts.rs || true
            fi
            # Fallback to master contract set if local contracts didn't produce output
            if [ ! -f src/generated_contracts.rs ] && [ -d "$PC_CONTRACTS" ]; then
              pv codegen "$PC_CONTRACTS" -o src/generated_contracts.rs || true
            fi
          fi
          # Generate for workspace members (crates/*/, */src/)
          for src_dir in crates/*/src */src; do
            if [ -d "$src_dir" ] && [ -f "$src_dir/lib.rs" ] && grep -q 'mod generated_contracts' "$src_dir/lib.rs" && [ ! -f "$src_dir/generated_contracts.rs" ]; then
              member_dir=$(dirname "$src_dir")
              if [ -d "$member_dir/contracts" ]; then
                pv codegen "$member_dir/contracts" -o "$src_dir/generated_contracts.rs" || true
              fi
              if [ ! -f "$src_dir/generated_contracts.rs" ] && [ -d "$PC_CONTRACTS" ]; then
                pv codegen "$PC_CONTRACTS" -o "$src_dir/generated_contracts.rs" || true
              fi
            fi
          done
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests
        env:
          TEST_ARGS: ${{ inputs.test_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo test --lib $TEST_ARGS 2>&1 || \
          cargo test --lib -p "$REPO_NAME" $TEST_ARGS 2>&1 || \
          { echo "::error::Tests failed — check workspace path dependencies"; exit 1; }

  lint:
    name: lint
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper-apr; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --quiet "https://github.com/paiml/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
          if [ -d whisper-apr ] && [ ! -e whisper.apr ]; then
            ln -s whisper-apr whisper.apr
          fi
      - name: Generate contract assertions (pv codegen)
        run: |
          if ! command -v pv &>/dev/null; then
            curl -sSL "https://github.com/paiml/provable-contracts/releases/download/nightly/pv-x86_64-unknown-linux-gnu.tar.gz" \
              | tar xz -C /usr/local/bin 2>/dev/null || true
          fi
          if [ -d contracts ] && command -v pv &>/dev/null; then
            pv codegen contracts/ -o src/generated_contracts.rs 2>/dev/null || true
          fi
          for member_contracts in crates/*/contracts; do
            if [ -d "$member_contracts" ] && command -v pv &>/dev/null; then
              member_dir=$(dirname "$member_contracts")
              pv codegen "$member_contracts" -o "$member_dir/src/generated_contracts.rs" 2>/dev/null || true
            fi
          done
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check 2>&1 || echo "::warning::Format issues found"
        continue-on-error: true
      - name: Clippy
        env:
          CLIPPY_ARGS: ${{ inputs.clippy_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo clippy $CLIPPY_ARGS -- -D warnings 2>&1 || \
          cargo clippy -p "$REPO_NAME" -- -D warnings 2>&1 || \
          { echo "::error::Clippy failed — check workspace path dependencies"; exit 1; }
      - name: Supply chain audit (cargo deny)
        continue-on-error: true
        run: |
          if [ -f deny.toml ]; then
            cargo deny check advisories licenses sources
          else
            echo "::warning::No deny.toml — skipping supply chain audit"
          fi

  coverage:
    name: coverage
    if: ${{ !inputs.skip_coverage }}
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper-apr; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --quiet "https://github.com/paiml/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
          if [ -d whisper-apr ] && [ ! -e whisper.apr ]; then
            ln -s whisper-apr whisper.apr
          fi
      - name: Generate contract assertions (pv codegen)
        run: |
          if ! command -v pv &>/dev/null; then
            curl -sSL "https://github.com/paiml/provable-contracts/releases/download/nightly/pv-x86_64-unknown-linux-gnu.tar.gz" \
              | tar xz -C /usr/local/bin 2>/dev/null || true
          fi
          if [ -d contracts ] && command -v pv &>/dev/null; then
            pv codegen contracts/ -o src/generated_contracts.rs 2>/dev/null || true
          fi
          for member_contracts in crates/*/contracts; do
            if [ -d "$member_contracts" ] && command -v pv &>/dev/null; then
              member_dir=$(dirname "$member_contracts")
              pv codegen "$member_contracts" -o "$member_dir/src/generated_contracts.rs" 2>/dev/null || true
            fi
          done
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
      - name: Run coverage
        env:
          TEST_ARGS: ${{ inputs.test_args }}
          REPO_NAME: ${{ inputs.repo }}
        run: |
          cargo llvm-cov test --lib --lcov --output-path lcov.info $TEST_ARGS 2>&1 || \
          cargo llvm-cov test --lib -p "$REPO_NAME" --lcov --output-path lcov.info 2>&1 || \
          { echo "::error::Coverage failed — check workspace path dependencies"; exit 1; }
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
        continue-on-error: true

  bench:
    name: bench
    if: ${{ inputs.run_benchmarks }}
    runs-on: [self-hosted, clean-room]
    container:
      image: localhost:5000/sovereign-ci:stable
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper-apr; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --quiet "https://github.com/paiml/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
          if [ -d whisper-apr ] && [ ! -e whisper.apr ]; then
            ln -s whisper-apr whisper.apr
          fi
      - name: Generate contract assertions (pv codegen)
        run: |
          if ! command -v pv &>/dev/null; then
            curl -sSL "https://github.com/paiml/provable-contracts/releases/download/nightly/pv-x86_64-unknown-linux-gnu.tar.gz" \
              | tar xz -C /usr/local/bin 2>/dev/null || true
          fi
          if [ -d contracts ] && command -v pv &>/dev/null; then
            pv codegen contracts/ -o src/generated_contracts.rs 2>/dev/null || true
          fi
          for member_contracts in crates/*/contracts; do
            if [ -d "$member_contracts" ] && command -v pv &>/dev/null; then
              member_dir=$(dirname "$member_contracts")
              pv codegen "$member_contracts" -o "$member_dir/src/generated_contracts.rs" 2>/dev/null || true
            fi
          done
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            /usr/local/cargo/registry
            /usr/local/cargo/git
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Run criterion benchmarks
        env:
          REPO_NAME: ${{ inputs.repo }}
        run: |
          if ls benches/*.rs 2>/dev/null | head -1 | grep -q '.'; then
            cargo bench --bench '*' -- --output-format bencher 2>&1 | tee bench-results.txt || \
            cargo bench -p "$REPO_NAME" -- --output-format bencher 2>&1 | tee bench-results.txt || \
            echo "::warning::Benchmarks failed"
          else
            echo "No benches/ directory — skipping"
          fi
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ inputs.repo }}
          path: bench-results.txt
          retention-days: 90
        continue-on-error: true

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Checkout sibling repos (path deps)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          for repo in provable-contracts probar trueno trueno-rag trueno-db trueno-viz alimentar presentar aprender renacer batuta realizar whisper-apr; do
            if [ ! -d "$repo" ]; then
              git clone --depth 1 --quiet "https://github.com/paiml/$repo.git" "$repo" 2>/dev/null || true
            fi
          done
          if [ -d whisper-apr ] && [ ! -e whisper.apr ]; then
            ln -s whisper-apr whisper.apr
          fi
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true
      - name: Audit
        run: cargo audit

  provenance:
    name: provenance
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2
        with:
          subject-path: 'Cargo.toml'
        continue-on-error: true

  gate:
    name: gate
    runs-on: [self-hosted, clean-room]
    timeout-minutes: 5
    if: always()
    needs: [test, lint, coverage, security, provenance]
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "::error::Test failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [ "${{ needs.coverage.result }}" = "failure" ]; then
            echo "::error::Coverage failed"
            exit 1
          fi
          echo "All critical jobs passed"
