        run: |
          if [ -f deny.toml ]; then
            cargo deny check advisories licenses sources
          else
            echo "::warning::No deny.toml — skipping supply chain audit"
          fi
      - name: Restore runner ownership of sibling workspace
        if: always()
        run: |
          chown -R 1000:1000 "$GITHUB_WORKSPACE/.." 2>/dev/null || true

